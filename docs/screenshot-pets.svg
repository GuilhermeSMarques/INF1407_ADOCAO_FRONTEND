  <text x="210" y="466" font-family="sans-serif" font-size="12" fill="white" text-anchor="middle">Solicitar adoção</text>
  <!-- Card 2 -->
  <rect x="304" y="192" width="264" height="300" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="304" y="192" width="264" height="140" rx="8" fill="#fce7f3"/>
  <text x="436" y="268" font-family="sans-serif" font-size="32" text-anchor="middle">🐈</text>
  <text x="324" y="356" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1e293b">Mia</text>
  <rect x="324" y="362" width="60" height="18" rx="9" fill="#dcfce7"/>
  <text x="354" y="375" font-family="sans-serif" font-size="11" fill="#16a34a" text-anchor="middle">disponível</text>
  <text x="324" y="400" font-family="sans-serif" font-size="12" fill="#64748b">Gato · Pequeno</text>
  <text x="324" y="418" font-family="sans-serif" font-size="12" fill="#64748b">Siamesa dócil e carinhosa</text>
  <rect x="324" y="448" width="100" height="28" rx="4" fill="#f1f5f9"/>
  <text x="374" y="466" font-family="sans-serif" font-size="12" fill="#475569" text-anchor="middle">Favoritar</text>
  <rect x="432" y="448" width="116" height="28" rx="4" fill="#2563eb"/>
  <text x="490" y="466" font-family="sans-serif" font-size="12" fill="white" text-anchor="middle">Solicitar adoção</text>
  <!-- Card 3 -->
  <rect x="584" y="192" width="264" height="300" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="584" y="192" width="264" height="140" rx="8" fill="#fef3c7"/>
  <text x="716" y="268" font-family="sans-serif" font-size="32" text-anchor="middle">🐕</text>
  <text x="604" y="356" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1e293b">Bolinha</text>
  <rect x="604" y="362" width="80" height="18" rx="9" fill="#fee2e2"/>
  <text x="644" y="375" font-family="sans-serif" font-size="11" fill="#dc2626" text-anchor="middle">em processo</text>
  <text x="604" y="400" font-family="sans-serif" font-size="12" fill="#64748b">Cachorro · Médio</text>
  <text x="604" y="418" font-family="sans-serif" font-size="12" fill="#64748b">SRD muito calmo</text>
  <text x="450" y="530" font-family="sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Lista de pets disponíveis com filtros por espécie, porte e status</text>
</svg>
