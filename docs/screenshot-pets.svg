<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560">
  <rect width="900" height="560" fill="#f8f9fa"/>
  <!-- Header -->
  <rect width="900" height="64" fill="#2563eb"/>
