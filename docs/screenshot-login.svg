<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">
  <rect width="900" height="520" fill="#f8f9fa"/>
  <!-- Header -->
  <rect width="900" height="64" fill="#2563eb"/>
  <text x="24" y="40" font-family="sans-serif" font-size="20" font-weight="bold" fill="white">Adoção de Pets</text>
  <text x="24" y="58" font-family="sans-serif" font-size="12" fill="#bfdbfe">Frontend acadêmico consumindo a API Django REST.</text>
  <!-- Nav -->
  <rect y="64" width="900" height="40" fill="#1e40af"/>
  <rect x="16" y="72" width="60" height="24" rx="4" fill="#3b82f6"/>
  <text x="46" y="88" font-family="sans-serif" font-size="13" fill="white" text-anchor="middle">Pets</text>
  <!-- Login form -->
  <rect x="24" y="128" width="260" height="220" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="44" y="160" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1e293b">Entrar</text>
  <rect x="44" y="170" width="220" height="36" rx="4" fill="#f1f5f9"/>
  <text x="54" y="193" font-family="sans-serif" font-size="13" fill="#94a3b8">Email</text>
  <rect x="44" y="214" width="220" height="36" rx="4" fill="#f1f5f9"/>
  <text x="54" y="237" font-family="sans-serif" font-size="13" fill="#94a3b8">Senha</text>
  <rect x="44" y="258" width="220" height="36" rx="4" fill="#2563eb"/>
  <text x="154" y="281" font-family="sans-serif" font-size="14" fill="white" text-anchor="middle">Entrar</text>
  <!-- Register form -->
  <rect x="300" y="128" width="260" height="280" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="320" y="160" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1e293b">Criar conta</text>
  <rect x="320" y="170" width="220" height="32" rx="4" fill="#f1f5f9"/>
  <text x="330" y="191" font-family="sans-serif" font-size="13" fill="#94a3b8">Nome</text>
  <rect x="320" y="210" width="220" height="32" rx="4" fill="#f1f5f9"/>
  <text x="330" y="231" font-family="sans-serif" font-size="13" fill="#94a3b8">Email</text>
  <rect x="320" y="250" width="220" height="32" rx="4" fill="#f1f5f9"/>
  <text x="330" y="271" font-family="sans-serif" font-size="13" fill="#94a3b8">Telefone</text>
  <rect x="320" y="290" width="220" height="32" rx="4" fill="#f1f5f9"/>
  <text x="330" y="311" font-family="sans-serif" font-size="13" fill="#94a3b8">Senha</text>
  <rect x="320" y="330" width="220" height="32" rx="4" fill="#f1f5f9"/>
  <text x="330" y="351" font-family="sans-serif" font-size="13" fill="#94a3b8">Tipo: Adotante</text>
  <rect x="320" y="368" width="220" height="32" rx="4" fill="#64748b"/>
  <text x="430" y="389" font-family="sans-serif" font-size="14" fill="white" text-anchor="middle">Cadastrar</text>
  <!-- Reset form -->
  <rect x="576" y="128" width="300" height="180" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="596" y="160" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1e293b">Recuperar senha</text>
  <rect x="596" y="170" width="260" height="36" rx="4" fill="#f1f5f9"/>
  <text x="606" y="193" font-family="sans-serif" font-size="13" fill="#94a3b8">Email</text>
  <rect x="596" y="214" width="260" height="36" rx="4" fill="#64748b"/>
  <text x="726" y="237" font-family="sans-serif" font-size="14" fill="white" text-anchor="middle">Gerar recuperação</text>
  <text x="450" y="490" font-family="sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Tela de autenticação — login, cadastro e recuperação de senha</text>
</svg>
