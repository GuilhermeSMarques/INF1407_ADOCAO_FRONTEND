  <rect x="24" y="272" width="180" height="100" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="114" y="326" font-family="sans-serif" font-size="36" font-weight="bold" fill="#16a34a" text-anchor="middle">2</text>
  <text x="114" y="352" font-family="sans-serif" font-size="13" fill="#64748b" text-anchor="middle">Aprovadas</text>

