  <rect x="416" y="272" width="180" height="100" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="506" y="326" font-family="sans-serif" font-size="36" font-weight="bold" fill="#0891b2" text-anchor="middle">4</text>
